kind = "web"
previewPath = "/"
title = "AI Content Detector"
version = "1.0.0"
id = "artifacts/ai-detector"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 22682
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/ai-detector run dev"

[services.env]
PORT = "22682"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/ai-detector", "run", "build"]
publicDir = "artifacts/ai-detector/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
