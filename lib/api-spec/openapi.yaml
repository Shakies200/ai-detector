openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: AI Content Detector API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: detect
    description: AI content detection operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /detect/text:
    post:
      operationId: detectText
      tags: [detect]
      summary: Detect AI-generated text
      description: Analyzes plain text and returns AI detection results
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DetectTextRequest"
      responses:
        "200":
          description: Detection result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DetectionResult"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /detect/file:
    post:
      operationId: detectFile
      tags: [detect]
      summary: Detect AI-generated content in uploaded file
      description: Analyzes uploaded file (PDF, Word, image) and returns AI detection results
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
              required:
                - file
      responses:
        "200":
          description: Detection result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DetectionResult"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    DetectTextRequest:
      type: object
      properties:
        text:
          type: string
          minLength: 10
      required:
        - text
    DetectionResult:
      type: object
      properties:
        score:
          type: number
          minimum: 0
          maximum: 100
          description: Probability (0-100) that the content is AI-generated
        verdict:
          type: string
          enum: [human, likely_human, uncertain, likely_ai, ai]
          description: Overall verdict
        explanation:
          type: string
          description: Detailed explanation of the analysis
        highlights:
          type: array
          items:
            type: string
          description: Key indicators found in the content
        fileType:
          type: string
          description: Type of file analyzed (text, pdf, word, image)
        extractedText:
          type: string
          description: Text extracted from the file (if applicable)
      required:
        - score
        - verdict
        - explanation
        - highlights
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
        message:
          type: string
      required:
        - error
        - message
